<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>주식거래대금분석</title>
<link rel="preload" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css"></noscript>
<style>
:root{
  --sky:#378ADD;--sky50:#E6F1FB;--sky100:#B5D4F4;--sky600:#185FA5;--sky800:#0C447C;
  --teal:#1D9E75;--teal50:#E1F5EE;--teal600:#147a5a;
  --coral:#D85A30;--coral50:#FAECE7;
  --amber:#BA7517;--amber50:#FAEEDA;
  --green:#639922;--green50:#EAF3DE;
  --purple:#534AB7;--purple50:#EEEDFE;
  --red:#D8302F;--red50:#FBE9E8;--blue:#2563C9;--blue50:#E7EFFB;
  --gray50:#F1EFE8;--gray600:#5F5E5A;
  --bg:#F5F8FF;--card:#FFFFFF;--border:#E0EAF5;--border2:#EBF3FF;
  --txt:#1A2535;--txt2:#3D4F68;--txt3:#6B7E99;
  --r8:8px;--r12:12px;--r14:14px;--r16:16px;--r20:20px;
  --shadow:0 2px 12px rgba(55,138,221,.08);
  --shadow-hover:0 6px 24px rgba(55,138,221,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;font-size:15px;line-height:1.6;word-break:keep-all;color:var(--txt);background:var(--bg);-webkit-font-smoothing:antialiased;}
.wrap{max-width:1100px;margin:0 auto;min-height:100dvh;}

/* ── HEADER ── */
.hdr-wrap{position:fixed;top:0;left:0;right:0;z-index:50;box-shadow:0 2px 12px rgba(12,68,124,.18);}
.header{background:var(--sky800);padding:max(12px,env(safe-area-inset-top)) 16px 12px;display:flex;align-items:center;justify-content:space-between;max-width:1100px;margin:0 auto;}
.header-left{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo-mark{width:38px;height:38px;background:rgba(255,255,255,.15);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-title{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.02em;}
.logo-sub{font-size:11.5px;color:rgba(255,255,255,.8);}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.header-btns{display:flex;gap:7px;}
.hdr-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:18px;padding:5px 12px;font-size:12.5px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:5px;min-height:32px;-webkit-tap-highlight-color:transparent;transition:.18s;}
.hdr-btn:hover{background:rgba(255,255,255,.25);}
.hdr-btn:disabled{opacity:.5;cursor:not-allowed;}
.hdr-btn-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:#6EE7B7;}
.hdr-btn-dot.off{background:#FCA5A5;}
.last-update{font-size:10.5px;color:rgba(255,255,255,.75);}
@keyframes spin-icon{to{transform:rotate(360deg)}}
.spinning{animation:spin-icon .8s linear infinite;display:inline-block;}

/* ── TAB NAV ── */
.top-nav{background:#fff;border-bottom:1.5px solid var(--border);display:flex;padding:0 4px;max-width:1100px;margin:0 auto;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;overscroll-behavior-x:contain;}
.top-nav::-webkit-scrollbar{display:none;}
.tab-btn{flex:1;flex-shrink:0;min-width:56px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--txt2);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;padding:13px 4px;-webkit-tap-highlight-color:transparent;transition:color .15s;position:relative;white-space:nowrap;}
.tab-btn.on{color:var(--sky600);}
.tab-btn.on::after{content:'';position:absolute;bottom:0;left:8%;right:8%;height:2.5px;background:var(--sky);border-radius:2px 2px 0 0;}
.tab-btn:hover:not(.on){color:var(--txt);}

/* ── MAIN ── */
.main{padding:0 14px 14px;}
.panel{display:none;}
.panel.on{display:block;animation:fade .25s;}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── KPI ── */
.kpi-row{display:flex;gap:9px;margin-bottom:14px;padding-top:10px;flex-wrap:wrap;}
.kpi-card{flex:1;min-width:76px;background:var(--card);border:1px solid var(--border);border-radius:var(--r12);padding:11px 12px;text-align:center;box-shadow:var(--shadow);}
.kpi-card .num{font-size:13px;font-weight:700;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.kpi-card .num-n{font-size:18px;font-weight:700;line-height:1.05;}
.kpi-card .lbl{font-size:12.5px;margin-top:4px;font-weight:700;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.kpi-up .num,.kpi-up .num-n{color:var(--red);} .kpi-up .lbl{color:var(--red);}
.kpi-down .num,.kpi-down .num-n{color:var(--blue);} .kpi-down .lbl{color:var(--blue);}
.kpi-tot .num,.kpi-tot .num-n{color:var(--sky600);} .kpi-tot .lbl{color:var(--sky600);}
.kpi-amt .num,.kpi-amt .num-n{color:var(--purple);} .kpi-amt .lbl{color:var(--purple);}
.kpi-teal .num,.kpi-teal .num-n{color:var(--teal600);} .kpi-teal .lbl{color:var(--teal600);}
.kpi-coral .num,.kpi-coral .num-n{color:var(--coral);} .kpi-coral .lbl{color:var(--coral);}
.kpi-amber .num,.kpi-amber .num-n{color:var(--amber);} .kpi-amber .lbl{color:var(--amber);}
.kpi-sky .num,.kpi-sky .num-n{color:var(--sky);} .kpi-sky .lbl{color:var(--sky);}
.kpi-purple .num,.kpi-purple .num-n{color:var(--purple);} .kpi-purple .lbl{color:var(--purple);}

/* ── TOOLBAR ── */
.toolbar{background:var(--card);border:1px solid var(--border);border-radius:var(--r12);padding:11px 13px;margin-bottom:14px;box-shadow:var(--shadow);}
.f-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.sel{padding:8px 11px;border-radius:var(--r8);border:1.5px solid var(--border);font-size:13.5px;font-family:inherit;color:var(--txt);background:var(--card);outline:none;cursor:pointer;transition:border .15s;}
.sel:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(55,138,221,.1);}
.sel.period-sel{font-weight:700;color:var(--sky600);background:var(--sky50);border-color:var(--sky100);}
.search-box{padding:8px 11px;border-radius:var(--r8);border:1.5px solid var(--border);font-size:13.5px;font-family:inherit;color:var(--txt);background:var(--card);outline:none;flex:1;min-width:140px;}
.search-box:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(55,138,221,.1);}
.f-label{font-size:13px;font-weight:700;color:var(--txt2);white-space:nowrap;}

/* ── SECTION CARD ── */
.sc{background:var(--card);border-radius:var(--r12);border:1px solid var(--border);padding:15px;margin-bottom:14px;box-shadow:var(--shadow);}
.sc-title{font-size:15px;font-weight:800;color:var(--txt);margin-bottom:12px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.sc-title .sub{font-size:12.5px;font-weight:600;color:var(--txt2);}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--r8);-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain;}
table{width:100%;border-collapse:collapse;font-size:14px;}
thead th{background:var(--sky50);color:var(--sky800);font-weight:800;font-size:13px;padding:10px 8px;text-align:right;white-space:nowrap;position:sticky;top:0;}
thead th.l{text-align:left;}
tbody td{padding:10px 8px;border-bottom:1px solid var(--border2);text-align:right;white-space:nowrap;color:var(--txt);}
tbody td.l{text-align:left;}
tbody tr:hover{background:var(--sky50);}
.t-rank{font-weight:800;color:var(--txt2);min-width:28px;}
.t-name{font-weight:700;}
.t-name .c{font-size:12.5px;color:var(--txt2);font-weight:600;margin-left:4px;}
.t-chg{font-weight:700;}
.t-amt{font-weight:700;}
.t-up{color:var(--red);} .t-down{color:var(--blue);}

/* ── RANK DELTA ── */
.delta{display:inline-flex;align-items:center;gap:2px;font-size:12.5px;font-weight:800;padding:2px 8px;border-radius:10px;}
.delta.up{background:var(--red50);color:var(--red);}
.delta.down{background:var(--blue50);color:var(--blue);}
.delta.new{background:var(--coral50);color:var(--coral);}
.delta.flat{background:var(--gray50);color:var(--gray600);}

/* ── BAR CHART ── */
.bars{display:flex;flex-direction:column;gap:7px;}
.bar-row{display:grid;grid-template-columns:110px 1fr 56px;align-items:center;gap:9px;}
.bar-lbl{font-size:13px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{background:var(--bg);border-radius:6px;height:20px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;transition:width .5s;min-width:2px;}
.bar-val{font-size:12.5px;font-weight:800;color:var(--txt2);text-align:right;}

/* ── TREND CHART ── */
.trend-wrap{width:100%;overflow-x:auto;}
.trend-svg{display:block;min-width:280px;}

/* ── BADGES ── */
.bdg{font-size:12px;font-weight:700;padding:3px 9px;border-radius:11px;letter-spacing:-.01em;white-space:nowrap;}

/* ── 모멘텀 카드 ── */
.mom-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r12);padding:14px;transition:.18s;}
.mom-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px);}
.mom-head{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.mom-medal{font-size:18px;}
.mom-name{font-size:15px;font-weight:800;color:var(--txt);}
.mom-score{font-size:30px;font-weight:800;line-height:1;letter-spacing:-.02em;}
.mom-score-u{font-size:13px;font-weight:700;margin-left:2px;}
.mom-tags{margin:8px 0 10px;}
.mom-tag{font-size:13px;font-weight:700;padding:4px 10px;border-radius:9px;}
.mom-stats{display:grid;grid-template-columns:1fr 1fr;gap:7px 10px;}
.mom-stat{display:flex;justify-content:space-between;align-items:center;font-size:13.5px;}
.mom-stat-l{color:var(--txt2);font-weight:600;}
.mom-stat-v{font-weight:800;color:var(--txt);}

/* ── 자금흐름 상태 뱃지 ── */
.fs-bdg{font-size:12px;font-weight:600;padding:3px 8px;border-radius:8px;white-space:nowrap;}
.fs-hot{background:var(--red50);color:var(--red);}
.fs-up{background:var(--coral50);color:var(--coral);}
.fs-out{background:var(--blue50);color:var(--blue);}
.fs-hold{background:var(--teal50);color:var(--teal600);}
.fs-flat{background:var(--gray50);color:var(--gray600);}

/* ── 모멘텀 바 (테이블 내) ── */
.mom-cell{display:flex;flex-direction:column;align-items:center;gap:4px;padding:2px 0;}
.mom-bar-wrap{width:58px;height:7px;background:var(--bg);border-radius:4px;overflow:hidden;}
.mom-bar-fill{height:100%;border-radius:4px;transition:width .4s;}
.mom-cell-num{font-size:11px;font-weight:600;line-height:1;text-align:center;color:var(--txt2);}

/* ── 모멘텀 1위 대표 카드 ── */
.mom-card-lead{padding:16px 18px;}
.mom-lead-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;}
.mom-lead-left{display:flex;flex-direction:column;gap:8px;}
.mom-card-lead .mom-head{margin-bottom:0;}
.mom-card-lead .mom-tags{margin:0;}
.mom-card-lead .mom-score{font-size:34px;}

/* ── 🔥 주목 종목 ── */
.hot-sc{border:1.5px solid var(--coral);background:linear-gradient(180deg,#FFF8F5 0%,var(--card) 60%);}
.hot-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;}
.hot-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r12);padding:12px;cursor:pointer;transition:.18s;}
.hot-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px);border-color:var(--coral);}
.hot-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.hot-tag{font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:8px;}
.hot-new{background:var(--coral50);color:var(--coral);}
.hot-surge{background:var(--red50);color:var(--red);}
.hot-rank{font-size:12.5px;font-weight:700;color:var(--purple);}
.hot-name{font-size:15px;font-weight:800;color:var(--txt);margin-bottom:9px;}
.hot-metrics{display:flex;flex-direction:column;gap:5px;}
.hot-metric{display:flex;align-items:center;justify-content:space-between;font-size:13px;}
.hot-metric-l{color:var(--txt2);font-weight:600;}

/* ── 범례 ── */
.legend-row{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:12px;padding-top:11px;border-top:1px dashed var(--border);}
.legend-item{font-size:13px;color:var(--txt2);line-height:1.55;}
.legend-item b{color:var(--txt);font-weight:700;}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:48px 20px;color:var(--txt3);}
.empty .ico{font-size:38px;margin-bottom:10px;}
.empty .msg{font-size:15px;font-weight:700;color:var(--txt2);}
.empty .sub{font-size:13px;margin-top:6px;color:var(--txt3);}
.skel{height:110px;background:linear-gradient(90deg,#eef4fc 25%,#f7faff 50%,#eef4fc 75%);background-size:200% 100%;animation:shim 1.3s infinite;border-radius:var(--r12);}
@keyframes shim{to{background-position:-200% 0}}

/* ── MODAL ── */
#cfgModal{display:none;}
#cfgModal.modal-open{display:block;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9000;}
.modal-backdrop{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:18px;}
.modal-box{background:var(--card);border-radius:var(--r20);padding:24px;width:100%;max-width:450px;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:800;color:var(--txt);margin-bottom:18px;display:flex;align-items:center;gap:7px;}
.modal-field{margin-bottom:14px;}
.modal-label{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:6px;display:block;}
.modal-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r8);padding:10px 12px;font-size:14px;font-family:inherit;color:var(--txt);outline:none;transition:border .18s;}
.modal-input:focus{border-color:var(--sky);background:#fff;}
.modal-hint{font-size:12.5px;color:var(--txt2);margin-top:4px;line-height:1.55;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.modal-save{background:var(--sky);border:none;color:#fff;border-radius:var(--r8);padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;min-height:42px;}
.modal-save:hover{background:var(--sky600);}
.modal-cancel{background:var(--bg);border:1.5px solid var(--border);color:var(--txt2);border-radius:var(--r8);padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;min-height:42px;}

/* ── TOAST ── */
#toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:var(--txt);color:#fff;padding:11px 20px;border-radius:22px;font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:.3s;z-index:9999;max-width:90vw;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.25);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── RESPONSIVE ── */

/* 모바일 ≤600px */
@media(max-width:600px){
  .main{padding:10px 10px 14px;}
  .tab-btn{font-size:13.5px;}
  table{font-size:13px;}
  thead th,tbody td{padding:8px 5px;}
  .t-name .c{display:none;}
  .bar-row{grid-template-columns:80px 1fr 48px;}
  .bar-lbl{font-size:12px;}
  .kpi-card{min-width:60px;padding:9px 7px;}
  .kpi-card .num-n{font-size:15px;}
  .kpi-card .lbl{font-size:11.5px;}
  .sel{min-height:40px;}
  .mom-stats{grid-template-columns:1fr;}
}

/* 소형 모바일 ≤480px */
@media(max-width:480px){
  .main{padding:8px 8px 12px;}
  .logo-sub{display:none;}
  .hdr-btn{padding:4px 10px;font-size:12px;}
  .sel{padding:7px 8px;font-size:12.5px;}
  .f-label{font-size:11.5px;}
  .kpi-row{gap:6px;}
  .kpi-card{min-width:52px;padding:8px 5px;}
  .kpi-card .num-n{font-size:14px;}
  .kpi-card .lbl{font-size:11px;margin-top:2px;}
  .tab-btn{font-size:12.5px;padding:10px 2px;}
  .sc{padding:11px;}
  table{font-size:12.5px;}
  thead th,tbody td{padding:7px 4px;}
  .bar-row{grid-template-columns:68px 1fr 44px;gap:6px;}
  .bar-lbl{font-size:11.5px;}
  .bar-val{font-size:11.5px;}
  .toolbar{padding:9px 10px;}
  .vcls-grid{grid-template-columns:1fr 1fr;}
  .hot-grid{grid-template-columns:1fr 1fr;}
  .vcls-num{font-size:18px;}
}

/* 최소 모바일 ≤360px */
@media(max-width:360px){
  .tab-btn{font-size:12px;min-width:50px;}
  .vcls-grid{grid-template-columns:1fr;}
  .kpi-card{min-width:44px;}
  .kpi-card .num-n{font-size:13px;}
}

/* 태블릿·PC ≥601px */
@media(min-width:601px){
  .bar-row{grid-template-columns:130px 1fr 64px;}
}

/* PC ≥769px */
@media(min-width:769px){
  .logo-title{font-size:18px;}
  .main{padding:0 20px 20px;}
  .kpi-card{padding:13px 16px;}
  .kpi-card .num-n{font-size:18px;}
  .kpi-card .lbl{font-size:13px;}
  .sc{padding:18px;}
  .bar-row{grid-template-columns:150px 1fr 72px;}
  table{font-size:14.5px;}
  thead th,tbody td{padding:11px 10px;}
  .sel{font-size:14px;padding:9px 12px;}
  .f-label{font-size:13.5px;}
  .toolbar{padding:13px 16px;}
  .vcls-grid{grid-template-columns:repeat(4,1fr);}
  .hot-grid{grid-template-columns:repeat(auto-fit,minmax(190px,1fr));}
  .mom-stats{grid-template-columns:1fr 1fr;}
}

/* 와이드 PC ≥1100px */
@media(min-width:1100px){
  .main{padding:0 0 24px;}
  .kpi-card{padding:14px 20px;}
  .kpi-card .num-n{font-size:20px;}
  .kpi-row{flex-wrap:nowrap;}
}
/* ── 시장 배지 ── */
.mkt-k{font-size:11px;font-weight:700;padding:2px 7px;border-radius:7px;background:var(--sky50);color:var(--sky600);margin-left:4px;}
.mkt-q{font-size:11px;font-weight:700;padding:2px 7px;border-radius:7px;background:var(--teal50);color:var(--teal600);margin-left:4px;}
/* ── 변동성 분류 배지 ── */
.vcls-spec{background:var(--red50);color:var(--red);}
.vcls-inst{background:var(--blue50);color:var(--blue);}
.vcls-stbl{background:var(--green50);color:var(--green);}
.vcls-neut{background:var(--gray50);color:var(--gray600);}
/* ── 변동성 분류 카드 ── */
.vcls-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:0;}
.vcls-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r12);padding:13px;}
.vcls-num{font-size:22px;font-weight:800;line-height:1;margin:6px 0 3px;}
.vcls-lbl{font-size:12px;color:var(--txt);font-weight:600;}
.vcls-names{margin-top:7px;font-size:12.5px;color:var(--txt2);line-height:1.6;font-weight:600;}
/* ── PC 전용 열 ── */
.pc-col{display:none;}
@media(min-width:769px){.pc-col{display:table-cell;}}
</style>
</head>
<body>
<div id="toast"></div>

<!-- 설정 모달 -->
<div id="cfgModal">
  <div class="modal-backdrop" onclick="closeCfgModal(event)">

// Notion fetch

async function fetchNotion(dbId, body, timeout){
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), timeout||15000);
  try{
    const res = await fetch(CFG.workerUrl+'/v1/databases/'+dbId+'/query', {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body||{}), signal:ctrl.signal
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const ct = res.headers.get('content-type')||'';
    if(!ct.includes('application/json')) throw new Error('Worker URL 오류');
    return await res.json();
  }finally{ clearTimeout(timer); }
}
async function fetchAllPages(dbId, sorts, filter){
  const body = {page_size:100};
  if(sorts) body.sorts = sorts;
  if(filter) body.filter = filter;
  const data = await fetchNotion(dbId, body);
  // Worker가 응답을 중첩 래핑하는 경우 대응
  function unwrap(d){ return (d && d.results) ? d : (d && d.data && d.data.results) ? d.data : {}; }
  const first = unwrap(data);
  let pages = first.results||[], cursor=first.next_cursor||null, hasMore=first.has_more||false, cnt=0;
  while(cursor && hasMore && ++cnt<200){
    const lab=document.getElementById('syncLabel');
    if(lab) lab.textContent='로딩… '+pages.length+'건 ('+cnt+'p)';
    let d2;
    try{
      d2 = await fetchNotion(dbId, {...body, start_cursor:cursor});
    }catch(e){
      await new Promise(r=>setTimeout(r,1500));
      // 재시도 실패 시 수집된 데이터 반환
      try{
        d2 = await fetchNotion(dbId, {...body, start_cursor:cursor});
      }catch(e2){
        break; // 부분 데이터라도 반환
      }
    }
    const page = unwrap(d2);
    const got = page.results||[];
    pages = pages.concat(got);
    cursor  = page.next_cursor||null;
    hasMore = page.has_more||false;
    if(!got.length) break;
  }
  return pages;
}
async function loadAllYears(dbId, sorts){
  const now=new Date();
  let yr=now.getFullYear(), mo=now.getMonth()+1;
  let allPages=[], empty=0;
  while(empty<13 && yr>=2023){
    const ms=String(mo).padStart(2,'0');
    const ny=mo===12?yr+1:yr, nm=mo===12?1:mo+1;
    const nd=`${ny}-${String(nm).padStart(2,'0')}-01`;
    const filter={and:[{property:'날짜',date:{on_or_after:`${yr}-${ms}-01`}},{property:'날짜',date:{before:nd}}]};
    const lab=document.getElementById('syncLabel');
    if(lab) lab.textContent=`로딩… ${yr}-${ms}`;
    const chunk=await fetchAllPages(dbId,sorts,filter);
    if(chunk.length){empty=0;allPages=allPages.concat(chunk);}else{empty++;}
    mo--; if(mo===0){mo=12;yr--;}
  }
  return allPages;
}
function getVal(p){
  if(!p) return '';
  switch(p.type){
    case 'title':     return (p.title||[]).map(t=>t.plain_text||'').join('');
    case 'rich_text': return (p.rich_text||[]).map(t=>t.plain_text||'').join('');
    case 'select':    return p.select?.name||'';
    case 'number':    return (p.number===null||p.number===undefined)?null:p.number;
    case 'date':{ const s=p.date?.start||''; const m=s.match(/^\d{4}-\d{2}-\d{2}/); return m?m[0]:s.slice(0,10); }
    case 'formula':{ const f=p.formula||{}; return f.type==='number'?f.number:(f.type==='string'?f.string:''); }
    default: return '';
  }
}
function filteredVolumes(){ return MKT_FILTER ? VOLUMES.filter(r=>r.market===MKT_FILTER) : VOLUMES; }
function numOr(v){ if(v===''||v===null||v===undefined) return null; const n=Number(v); return (isNaN(n)||!isFinite(n))?null:n; }
function parseVolumes(pages){
  return pages.map(pg=>{
    const pr = pg.properties||{};
    return {
      name:String(getVal(pr['종목명'])||'').trim(),
      code:String(getVal(pr['종목코드'])||'').trim(),
      date:String(getVal(pr['날짜'])||'').trim(),
      rank:numOr(getVal(pr['순위'])),
      close:numOr(getVal(pr['종가'])),
      chg:numOr(getVal(pr['등락률'])),
      vol:numOr(getVal(pr['거래량'])),
      amt:numOr(getVal(pr['거래대금'])),
      open:numOr(getVal(pr['시가'])),
      high:numOr(getVal(pr['고가'])),
      low:numOr(getVal(pr['저가'])),
      prevClose:numOr(getVal(pr['전일종가'])),
      prevDiff:numOr(getVal(pr['전일대비'])),
      mktcap:numOr(getVal(pr['시가총액'])),
      listedShares:numOr(getVal(pr['상장주식수'])),
      market:String(getVal(pr['시장'])||'').trim(),
      turnover:numOr(getVal(pr['회전율'])),
      volatility:numOr(getVal(pr['변동폭'])),
    };
  }).filter(r=>r.name&&r.date&&(r.rank!=null&&r.rank>0&&r.rank<=20));
}

function safeN(n){ return (n==null||n===''||typeof n==='number'&&isNaN(n)); }
function fmtNum(n){ if(safeN(n)) return '-'; return Number(n).toLocaleString('ko-KR'); }
function fmtRank(n){ if(safeN(n)) return '-'; return Number(n)+'위'; }
function fmtPct(n){ if(safeN(n)) return '-'; const v=Number(n); const s=v>0?'+':''; return s+v.toFixed(2)+'%'; }
function fmtAmt(n){
  if(safeN(n)) return '-';
  const v=Number(n);
  if(isNaN(v)||!isFinite(v)) return '-';
  if(v>=1e12) return (v/1e12).toFixed(2)+'조';
  if(v>=1e8)  return Math.round(v/1e8).toLocaleString('ko-KR')+'억';
  if(v>=1e4)  return Math.round(v/1e4).toLocaleString('ko-KR')+'만';
  return v.toLocaleString('ko-KR');
}
function chgCls(n){ if(safeN(n)) return ''; return n>0?'t-up':(n<0?'t-down':''); }
function chgColor(n){ return n>0?'#D8302F':(n<0?'#2563C9':'#7E8CA0'); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtDate(d){ if(!d) return '-'; const m=d.match(/^(\d{4})-(\d{2})-(\d{2})/); return m?m[1]+'.'+m[2]+'.'+m[3]:d; }
function fmtDateShort(d){ if(!d) return '-'; const m=d.match(/^(\d{4})-(\d{2})-(\d{2})/); return m?m[2]+'/'+m[3]:d; }
function fmtMktcap(n){ if(safeN(n)) return '-'; const v=Number(n); if(v>=1e12) return (v/1e12).toFixed(2)+'조'; if(v>=1e8) return Math.round(v/1e8).toLocaleString('ko-KR')+'억'; return v.toLocaleString('ko-KR'); }
function fmtTurnover(n){ if(safeN(n)) return '-'; return Number(n).toFixed(2)+'%'; }
function fmtPrevDiff(n){ if(safeN(n)) return '-'; const v=Number(n); return (v>0?'+':'')+v.toLocaleString('ko-KR'); }
function mktBadge(m){ if(!m) return ''; return '<span class="'+(m==='KOSPI'?'mkt-k':'mkt-q')+'">'+esc(m)+'</span>'; }
function mktcapSize(n){ if(safeN(n)||n<=0) return ''; if(n>=10e12) return '<span style="font-size:11px;font-weight:700;padding:2px 6px;border-radius:7px;background:var(--purple50);color:var(--purple)">대형</span>'; if(n>=1e12) return '<span style="font-size:11px;font-weight:700;padding:2px 6px;border-radius:7px;background:var(--sky50);color:var(--sky600)">중형</span>'; return '<span style="font-size:11px;font-weight:700;padding:2px 6px;border-radius:7px;background:var(--gray50);color:var(--gray600)">소형</span>'; }
function mktFilterHtml(){
  return '<select class="sel period-sel" onchange="setMktFilter(this.value)">'
    +'<option value=""'+(MKT_FILTER===''?' selected':'')+'>전체</option>'

    +'<option value="KOSDAQ"'+(MKT_FILTER==='KOSDAQ'?' selected':'')+'>KOSDAQ</option>'
    +'</select>';
}

function getMissingTradingDays(){
  if(!filteredVolumes().length) return [];
  const periodDates=getTop10PeriodDates();
  if(!periodDates.length) return [];
  const haveDates=new Set(periodDates);
  const latest=periodDates[0], earliest=periodDates[periodDates.length-1];
  const start=new Date(earliest+'T00:00:00'), end=new Date(latest+'T00:00:00');
  const missing=[], DN=['일','월','화','수','목','금','토'];
  for(let cur=new Date(start); cur<=end; cur.setDate(cur.getDate()+1)){
    const ds=cur.toISOString().slice(0,10);
    if(isTradingDay(ds)&&!haveDates.has(ds)) missing.push({date:ds,day:DN[cur.getDay()]});
  }
  return missing;
}

function goHistory(name){
  HIST_STOCK=name; HIST_YEAR=''; HIST_MONTH=''; HIST_DAY='';
  const btn=document.querySelector('.tab-btn[data-tab="history"]');
  if(btn) btn.click();
}
function consecAppear(name, fromDate){
  const allDates=distinctDatesDesc(filteredVolumes());
  const idx=allDates.indexOf(fromDate);
  if(idx<0) return 0;
  const appeared=new Set(filteredVolumes().filter(r=>r.name===name).map(r=>r.date));
  let count=0;
  for(let i=idx;i<allDates.length;i++){
    if(appeared.has(allDates[i])) count++; else break;
  }
  return count;
}

function renderChange(){
  const panel = document.getElementById('panel-change');
  if(!VOLUMES.length){ panel.innerHTML = emptyPanel(); return; }
  const dates = getPeriodDates(0);
  if(!SEL_DATE || !dates.includes(SEL_DATE)) SEL_DATE = dates[0]||'';
  const allDates = distinctDatesDesc(filteredVolumes());
  const idx = allDates.indexOf(SEL_DATE);
  const prevDate = (idx >= 0 && idx < allDates.length-1) ? allDates[idx+1] : null;
  const currRows = filteredVolumes().filter(r=>r.date===SEL_DATE).sort((a,b)=>(a.rank??999)-(b.rank??999));
  const prevMap = {};
  if(prevDate) filteredVolumes().filter(r=>r.date===prevDate).forEach(r=>{ prevMap[r.code||r.name]={rank:r.rank,amt:r.amt}; });
  const rows = currRows.map(r=>{
    const key = r.code||r.name;
    const prev = prevMap[key];
    const cr = validRank(r.rank)?r.rank:null;
    const pr = prev?.rank!=null&&validRank(prev.rank)?prev.rank:null;
    const delta = (cr!=null&&pr!=null) ? pr-cr : null;
    const amtDelta = (!safeN(r.amt)&&prev?.amt!=null&&!safeN(prev.amt)&&prev.amt>0) ? Math.round((r.amt-prev.amt)/prev.amt*100) : null;
    return {...r, rank:cr, prevRank:pr, delta, amtDelta};
  });
  const newEntries = rows.filter(r=>r.delta===null).length;
  const improved = rows.filter(r=>r.delta!==null&&r.delta>0).length;
  const worsened = rows.filter(r=>r.delta!==null&&r.delta<0).length;
  panel.innerHTML = ''
  + kpiRow([
      {cls:'kpi-up',num:improved,lbl:'순위상승'},
      {cls:'kpi-down',num:worsened,lbl:'순위하락'},
      {cls:'kpi-coral',num:newEntries,lbl:'신규진입'},
      {cls:'kpi-tot',num:rows.length,lbl:'총종목'},
    ])
  + '<div class="toolbar"><div class="f-row">'
  +   '<span class="f-label">기준일</span>'+dateTripleSelHtml()
  +   mktFilterHtml()
  +   '<span style="font-size:13px;font-weight:700;color:var(--txt2)">'+rows.length+'건</span>'
  + '</div></div>'
  + '<div class="sc"><div class="sc-title">순위 변동 <span class="sub">'+esc(SEL_DATE)+'</span></div>'
  +   '<div class="tbl-wrap"><table>'

            const adCls=r.amtDelta==null?'':(r.amtDelta>=0?'t-up':'t-down');

          }).join('')

// 유효 순위 여부 (null·NaN·undefined 제외)
function validRank(rank){ return rank!=null && !isNaN(rank) && isFinite(rank); }

// 특정 날짜의 신규진입 목록 계산
function calcEntrants(date, topN){
  const fv = filteredVolumes();
  const allDates = distinctDatesDesc(fv);
  const idx = allDates.indexOf(date);
  const prevDate = (idx>=0 && idx<allDates.length-1) ? allDates[idx+1] : null;
  const currTop = fv.filter(r=>r.date===date && validRank(r.rank) && (topN===0 || r.rank<=topN))
    .sort((a,b)=>a.rank-b.rank);
  const prevMap = {};
  if(prevDate) fv.filter(r=>r.date===prevDate).forEach(r=>{ prevMap[r.code||r.name]=r.rank; });
  return { prevDate, rows: currTop.map(r=>{
    const key = r.code||r.name;
    const prevRank = prevDate ? (prevMap[key]??null) : null;
    const isNew = !prevDate || prevRank==null || !validRank(prevRank) || (topN===0 || prevRank>topN);
    return {...r, prevDate, prevRank, isNew};
  }).filter(r=>r.isNew)};
}

function calcPeriodSummary(period, topN){
  return getPeriodDates(period).map(date=>{
    const {rows:ent, prevDate} = calcEntrants(date, topN);
    let exitN = 0;
    if(prevDate){
      const fv2 = filteredVolumes();
      const currKeys = new Set(fv2.filter(r=>r.date===date && validRank(r.rank) && (topN===0 || r.rank<=topN)).map(r=>r.code||r.name));
      exitN = fv2.filter(r=>r.date===prevDate && validRank(r.rank) && (topN===0 || r.rank<=topN) && !currKeys.has(r.code||r.name)).length;
    }
    return {date, entN:ent.length, exitN};
  });
}

        +'</div>'

function setTop10Period(v){
  TOP10_PERIOD = Number(v);
  renderTop10();
}
function setTop10Sort(v){
  TOP10_SORT = v;
  renderTop10();
}
function setTop10Rank(v){
  if(v==='5')       TOP10_RANK = {min:1, max:5};
  else if(v==='10') TOP10_RANK = {min:1, max:10};
  else              TOP10_RANK = {min:1, max:20};
  renderTop10();
}

function top10PeriodSelHtml(){
  return '<select class="sel period-sel" onchange="setTop10Period(this.value)" aria-label="기간 선택">'
    + PERIOD_OPTS.map(function(o){
        return '<option value="'+o.v+'"'+(TOP10_PERIOD===o.v?' selected':'')+'>'+o.l+'</option>';
      }).join('')
    + '</select>';
}

function top10RankSelHtml(){
  const opts = [{v:'5',l:'5위'},{v:'10',l:'10위'},{v:'20',l:'20위'}];
  const cur = TOP10_RANK.max<=5?'5':TOP10_RANK.max<=10?'10':'20';
  return '<select class="sel period-sel" onchange="setTop10Rank(this.value)" aria-label="순위 기준">'
    + opts.map(function(o){
        return '<option value="'+o.v+'"'+(cur===o.v?' selected':'')+'>'+o.l+'</option>';
      }).join('')
    + '</select>';
}

function getTop10PeriodDates(){
  const allDates = distinctDatesDesc(filteredVolumes());
  if(!TOP10_PERIOD || TOP10_PERIOD >= allDates.length) return allDates;
  return allDates.slice(0, TOP10_PERIOD);
}

function renderTop10(){
  const panel = document.getElementById('panel-top10');
  if(!VOLUMES.length){ panel.innerHTML = emptyPanel(); return; }

  const dates = getTop10PeriodDates();
  const dateSet = new Set(dates);

  // ETF 판별: 종목명에 운용사/ETF 키워드 포함
  function isEtf(name, code){
    if(!name) return false;
    const etfKeywords = ['KODEX','TIGER','KBSTAR','HANARO','KOSEF','ARIRANG','SOL ','ACE ','TIMEFOLIO','PLUS ','WON ','FOCUS','SMART','파워','KTOP','KCGI','마이다스','RISE','TREX','ETF','QV','IBK'];
    const upper = name.toUpperCase();
    // 키워드로 시작하거나 포함 여부
    for(let i=0;i<etfKeywords.length;i++){
      if(upper.indexOf(etfKeywords[i].trim()) === 0) return true;
    }
    // 종목코드 끝이 0이고 코드 2~3번째 자리가 특정 범위 (ETF 코드 대역: 069500~, 102xxx, 114xxx, 133xxx~, 160xxx~, 200xxx~, 250xxx~, 300xxx~ 등)
    if(code && /^\d{6}$/.test(code)){
      const n = parseInt(code, 10);
      if(n>=69500&&n<70000) return true;   // 069500 KODEX200
      if(n>=102000&&n<103000) return true;
      if(n>=105000&&n<106000) return true;
      if(n>=114000&&n<115000) return true;
      if(n>=133000&&n<134000) return true;
      if(n>=139000&&n<145000) return true;
      if(n>=152000&&n<165000) return true;
      if(n>=168000&&n<170000) return true;
      if(n>=176000&&n<177000) return true;
      if(n>=189000&&n<220000) return true;
      if(n>=222000&&n<240000) return true;
      if(n>=251000&&n<252000) return true;
      if(n>=261000&&n<262000) return true;
      if(n>=272000&&n<273000) return true;
      if(n>=278000&&n<280000) return true;
      if(n>=285000&&n<296000) return true;
      if(n>=304000&&n<320000) return true;
      if(n>=357000&&n<360000) return true;
      if(n>=360000&&n<380000) return true;
    }
    return false;
  }

  // 우선주 판별: 종목명 끝 '우'/'우B'/'우C' 또는 코드 끝자리 5
  function isPref(name, code){
    if(name && /[우][BbCc]?$/.test(name.trim())) return true;
    if(code && /^\d{6}$/.test(code) && code[5]==='5') return true;
    return false;
  }

  const rows = filteredVolumes().filter(function(r){
    return dateSet.has(r.date)
      && validRank(r.rank)
      && r.rank >= TOP10_RANK.min && r.rank <= TOP10_RANK.max
      && !isEtf(r.name, r.code)
      && !isPref(r.name, r.code);
  });

  // 종목별 집계
  const stockMap = {};
  rows.forEach(function(r){
    const key = r.code || r.name;
    if(!stockMap[key]){
      stockMap[key] = {name:r.name, code:r.code, dateSet:{}, ranks:[], amts:[], chgs:[], closes:[], mktcaps:[], turnovers:[], markets:[], series:[], lastDate:'', lastRank:null, lastChg:null, lastAmt:null, lastClose:null};
    }
    const s = stockMap[key];
    // 같은 날짜 중복 행 방지: 날짜별 최초 1건만 집계
    if(s.dateSet[r.date]) return;
    s.dateSet[r.date] = true;
    if(validRank(r.rank)) s.ranks.push(r.rank);
    if(!safeN(r.amt)) s.amts.push(r.amt);
    if(!safeN(r.chg)) s.chgs.push(r.chg);
    if(!safeN(r.close)) s.closes.push(r.close);
    if(!safeN(r.mktcap)) s.mktcaps.push(r.mktcap);
    if(!safeN(r.turnover)) s.turnovers.push(r.turnover);
    if(r.market) s.markets.push(r.market);
    s.series.push({date:r.date, rank:r.rank, amt:r.amt, chg:r.chg, close:r.close, mktcap:r.mktcap, turnover:r.turnover, market:r.market});
    if(!s.lastDate || r.date > s.lastDate){
      s.lastDate = r.date;
      s.lastRank = r.rank;
      s.lastChg = r.chg;
      s.lastAmt = r.amt;
      s.lastClose = r.close;
    }
  });

  const totalDaysG = dates.length;
  const halfLen = Math.max(Math.floor(totalDaysG/2), 1);
  const recentDates = dates.slice(0, halfLen);      // 최근 절반
  const olderDates  = dates.slice(halfLen);          // 이전 절반
  const recentSet = new Set(recentDates);
  const olderSet  = new Set(olderDates);

  const stocks = Object.values(stockMap).map(function(s){
    const days = Object.keys(s.dateSet).length;  // 고유 출현 날짜 수
    const avgRank = s.ranks.length ? (s.ranks.reduce(function(a,b){return a+b;},0)/s.ranks.length) : null;
    const bestRank = s.ranks.length ? Math.min.apply(null,s.ranks) : null;
    const worstRank = s.ranks.length ? Math.max.apply(null,s.ranks) : null;
    const avgAmt = s.amts.length ? (s.amts.reduce(function(a,b){return a+b;},0)/s.amts.length) : null;
    const avgChg = s.chgs.length ? (s.chgs.reduce(function(a,b){return a+b;},0)/s.chgs.length) : null;
    const totalDays = dates.length;
    const rate = totalDays > 0 ? Math.min(100, Math.round(days/totalDays*100)) : 0;

    // 시계열 정렬(오래된→최신)
    const ser = s.series.slice().sort(function(a,b){return a.date.localeCompare(b.date);});

    // 연속 출현(최신 날짜 기준)
    let consec = 0;
    for(let i=0;i<dates.length;i++){
      if(rows.some(function(r){return r.date===dates[i]&&(r.code||r.name)===(s.code||s.name);})) consec++; else break;
    }

    // ── 자금 유입 변화: 최근 절반 평균 vs 이전 절반 평균 거래대금
    const recentAmts = ser.filter(function(x){return recentSet.has(x.date)&&!safeN(x.amt);}).map(function(x){return x.amt;});
    const olderAmts  = ser.filter(function(x){return olderSet.has(x.date)&&!safeN(x.amt);}).map(function(x){return x.amt;});
    const recentAmtAvg = recentAmts.length ? recentAmts.reduce(function(a,b){return a+b;},0)/recentAmts.length : null;
    const olderAmtAvg  = olderAmts.length  ? olderAmts.reduce(function(a,b){return a+b;},0)/olderAmts.length  : null;
    let inflowPct = null;
    if(recentAmtAvg!=null && olderAmtAvg!=null && olderAmtAvg>0){
      inflowPct = Math.round((recentAmtAvg-olderAmtAvg)/olderAmtAvg*100);
    }

    // ── 순위 추세: 최근 절반 평균순위 vs 이전 절반 평균순위 (음수=순위 상승=좋음)
    const recentRanks = ser.filter(function(x){return recentSet.has(x.date)&&validRank(x.rank);}).map(function(x){return x.rank;});
    const olderRanks  = ser.filter(function(x){return olderSet.has(x.date)&&validRank(x.rank);}).map(function(x){return x.rank;});
    const recentRankAvg = recentRanks.length ? recentRanks.reduce(function(a,b){return a+b;},0)/recentRanks.length : null;
    const olderRankAvg  = olderRanks.length  ? olderRanks.reduce(function(a,b){return a+b;},0)/olderRanks.length  : null;
    let rankTrend = null; // 양수=순위 개선(상승), 음수=악화(하락)
    if(recentRankAvg!=null && olderRankAvg!=null){
      rankTrend = +(olderRankAvg - recentRankAvg).toFixed(1);
    }

    // ── 기간 누적 가격 변화율 (첫 종가 → 마지막 종가)
    const validCloses = ser.filter(function(x){return !safeN(x.close);});
    let priceChg = null;
    if(validCloses.length>=2){
      const first = validCloses[0].close, last = validCloses[validCloses.length-1].close;
      if(first>0) priceChg = +((last-first)/first*100).toFixed(1);
    }

    // ── 모멘텀 점수 (0~100): 출현율 + 평균순위 + 순위추세 + 자금유입 + 연속성
    // 1) 출현율 (0~25)
    const sRate = rate/100*25;
    // 2) 평균순위 점수 (1위=만점, 10위=최저) (0~25)
    const sRank = avgRank!=null ? (Math.max(0,(TOP10_RANK.max+1-avgRank)/TOP10_RANK.max))*25 : 0;
    // 3) 순위 추세 (0~20): +3 이상 개선 만점, -3 이하 0
    const sTrend = rankTrend!=null ? Math.max(0,Math.min(20,(rankTrend+3)/6*20)) : 10;
    // 4) 자금 유입 (0~20): +50% 이상 만점, -50% 이하 0
    const sInflow = inflowPct!=null ? Math.max(0,Math.min(20,(inflowPct+50)/100*20)) : 10;
    // 5) 연속성 (0~10)
    const sConsec = Math.min(10, consec/Math.max(totalDays,1)*10 + consec*1.2);
    const momentum = Math.round(sRate+sRank+sTrend+sInflow+Math.min(sConsec,10));

    // ── 자금흐름 상태 분류 (객관적 표현)
    let flowState, flowCls;
    if(inflowPct!=null && inflowPct>=30 && (rankTrend==null||rankTrend>=0)){ flowState='💰 자금몰림'; flowCls='fs-hot'; }
    else if(inflowPct!=null && inflowPct>=10){ flowState='📈 유입가속'; flowCls='fs-up'; }
    else if(inflowPct!=null && inflowPct<=-30){ flowState='📉 자금유출'; flowCls='fs-out'; }
    else if(rate>=60 && (rankTrend==null||rankTrend>=-1)){ flowState='🔒 꾸준유지'; flowCls='fs-hold'; }
    else { flowState='⚪ 관망권'; flowCls='fs-flat'; }

    // ── 신규 진입: 기간 후반엔 등장, 전반엔 미등장 (새로 TOP10 진입)
    const appearedRecent = ser.some(function(x){return recentSet.has(x.date);});
    const appearedOlder  = ser.some(function(x){return olderSet.has(x.date);});
    const isNew = appearedRecent && !appearedOlder && olderDates.length>0;
    // ── 주목: 신규진입 + 자금급증(또는 순위급등)
    const isHot = (isNew && (inflowPct==null||inflowPct>=0))
               || (inflowPct!=null && inflowPct>=30 && (rankTrend!=null && rankTrend>=2));

    const avgMktcap = s.mktcaps.length ? s.mktcaps.reduce((a,b)=>a+b,0)/s.mktcaps.length : null;
    const avgTurnover = s.turnovers.length ? s.turnovers.reduce((a,b)=>a+b,0)/s.turnovers.length : null;
    const primaryMarket = s.markets.length ? (s.markets.filter(m=>m==='KOSPI').length >= s.markets.length/2 ? 'KOSPI' : 'KOSDAQ') : '';
    return {...s, days, avgRank, bestRank, worstRank, avgAmt, avgChg, rate, consec,
            inflowPct, rankTrend, priceChg, momentum, flowState, flowCls,
            recentAmtAvg, olderAmtAvg, isNew, isHot, avgMktcap, avgTurnover, primaryMarket};
  });

  // ── 정렬 적용
  const sortFns = {
    momentum: function(a,b){ return b.momentum-a.momentum || b.days-a.days; },
    days:     function(a,b){ return b.days-a.days || (a.avgRank||99)-(b.avgRank||99); },
    inflow:   function(a,b){ return (b.inflowPct==null?-999:b.inflowPct)-(a.inflowPct==null?-999:a.inflowPct); },
    avgrank:  function(a,b){ return (a.avgRank||99)-(b.avgRank||99); },
  };
  stocks.sort(sortFns[TOP10_SORT]||sortFns.momentum);

  // KPI
  const totalDays = dates.length;
  const uniqueStocks = stocks.length;

  // 오늘의 주목: 모멘텀 1위
  const topMomentum = stocks.length ? stocks.slice().sort(function(a,b){return b.momentum-a.momentum;})[0] : null;
  // 자금 유입 1위
  const topInflow = stocks.filter(function(s){return s.inflowPct!=null;}).sort(function(a,b){return b.inflowPct-a.inflowPct;})[0];

  const sortLabels = {momentum:'모멘텀순', days:'빈도순', inflow:'자금유입순', avgrank:'평균순위순'};
  // 순위추세 화살표 HTML
  function trendArrow(t){
    if(t==null) return '<span style="color:var(--txt2)">–</span>';
    if(t>=1) return '<span style="color:var(--red);font-weight:700">▲'+t.toFixed(1)+'</span>';
    if(t<=-1) return '<span style="color:var(--blue);font-weight:700">▼'+Math.abs(t).toFixed(1)+'</span>';
    return '<span style="color:var(--txt2)">보합</span>';
  }
  function inflowHtml(p){
    if(p==null) return '<span style="color:var(--txt2)">–</span>';
    const c = p>=30?'var(--red)':(p>=10?'var(--coral)':(p<=-30?'var(--blue)':'var(--txt2)'));
    return '<span style="font-weight:700;color:'+c+'">'+(p>0?'+':'')+p+'%</span>';
  }

  // 주목 종목 (신규진입 또는 자금급증)
  const hotStocks = stocks.filter(function(s){return s.isHot;})
    .sort(function(a,b){return (b.inflowPct==null?-999:b.inflowPct)-(a.inflowPct==null?-999:a.inflowPct);});
  const newCount = stocks.filter(function(s){return s.isNew;}).length;

  panel.innerHTML = ''
  + kpiRow([
      {cls:'kpi-up',   num:topMomentum?esc(topMomentum.name):'-', lbl:'🔥 최고 모멘텀'},
      {cls:'kpi-coral',num:topInflow?esc(topInflow.name):'-',     lbl:'💰 자금유입 1위'},
      {cls:'kpi-amt',  num:newCount,        lbl:'🆕 신규 진입'},
      {cls:'kpi-teal', num:uniqueStocks,    lbl:'등장 종목수'},
    ])
  + '<div class="toolbar"><div class="f-row">'
  +   '<span class="f-label">기간</span>'+top10PeriodSelHtml()
  +   '<span class="f-label">순위</span>'+top10RankSelHtml()
  +   mktFilterHtml()
  +   '<span class="f-label">정렬</span>'
  +   '<select class="sel period-sel" onchange="setTop10Sort(this.value)" aria-label="정렬 기준">'
  +     Object.keys(sortLabels).map(function(k){
          return '<option value="'+k+'"'+(TOP10_SORT===k?' selected':'')+'>'+sortLabels[k]+'</option>';
        }).join('')
  +   '</select>'
  +   '<span style="font-size:13px;font-weight:700;color:var(--txt2)">'+rowsInPeriod(TOP10_PERIOD).length+'건</span>'
  + '</div></div>'

  // ── 🔥 주목 종목 (신규진입·자금급증) — 매매 타이밍 포착
  + (hotStocks.length>0 ? (function(){
      return '<div class="sc hot-sc">'
        +'<div class="sc-title">🔥 주목 종목 <span class="sub">새로 진입했거나 자금이 급증한 종목</span></div>'
        +'<div class="hot-grid">'
        + hotStocks.slice(0, MAX_HOT_STOCKS).map(function(s){
            const tag = s.isNew
              ? '<span class="hot-tag hot-new">🆕 신규진입</span>'
              : '<span class="hot-tag hot-surge">💰 자금급증</span>';
            return '<div class="hot-card" onclick="goHistory(\''+esc(s.name)+'\')">'
              +'<div class="hot-card-top">'+tag+'<span class="hot-rank">'+(s.avgRank!=null?s.avgRank.toFixed(1)+'위':'-')+'</span></div>'
              +'<div class="hot-name">'+esc(s.name)+'</div>'
              +'<div class="hot-metrics">'
              +  '<span class="hot-metric"><span class="hot-metric-l">자금유입</span>'+inflowHtml(s.inflowPct)+'</span>'
              +  '<span class="hot-metric"><span class="hot-metric-l">순위추세</span>'+trendArrow(s.rankTrend)+'</span>'
              +'</div>'
            +'</div>';
          }).join('')
        +'</div></div>';
    })() : '')

  // ── ⭐ 모멘텀 1위 대표 카드 (중복 축소: 1종목만 크게)
  + (topMomentum ? (function(){
      const s = topMomentum;
      const mc = s.momentum>=75?'var(--red)':(s.momentum>=55?'var(--coral)':'var(--sky600)');
      return '<div class="sc">'
        +'<div class="sc-title">⭐ 모멘텀 1위 <span class="sub">거래대금 집중도·순위추세·자금유입 종합</span></div>'
        +'<div class="mom-card mom-card-lead" style="cursor:pointer" onclick="goHistory(\''+esc(s.name)+'\')">'
          +'<div class="mom-lead-row">'
          +  '<div class="mom-lead-left">'
          +    '<div class="mom-head"><span class="mom-medal">🥇</span><span class="mom-name">'+esc(s.name)+'</span></div>'
          +    '<div class="mom-tags"><span class="mom-tag '+s.flowCls+'">'+esc(s.flowState)+'</span></div>'
          +  '</div>'
          +  '<div class="mom-score" style="color:'+mc+'">'+s.momentum+'<span class="mom-score-u">점</span></div>'
          +'</div>'
          +'<div class="mom-stats">'
          +  '<div class="mom-stat"><span class="mom-stat-l">평균순위</span><span class="mom-stat-v">'+(s.avgRank!=null?s.avgRank.toFixed(1)+'위':'-')+'</span></div>'
          +  '<div class="mom-stat"><span class="mom-stat-l">순위추세</span><span class="mom-stat-v">'+trendArrow(s.rankTrend)+'</span></div>'
          +  '<div class="mom-stat"><span class="mom-stat-l">자금유입</span><span class="mom-stat-v">'+inflowHtml(s.inflowPct)+'</span></div>'
          +  '<div class="mom-stat"><span class="mom-stat-l">출현율</span><span class="mom-stat-v">'+s.rate+'%</span></div>'
          +'</div>'
        +'</div></div>';
    })() : '')

  // ── 출현 빈도 바 차트 (색상 = 빈도 기준)
  + '<div class="sc">'
  +   '<div class="sc-title">출현 빈도 <span class="sub">기간 내 '+(TOP10_RANK.min===1?TOP10_RANK.max+'위 이내':TOP10_RANK.min+'~'+TOP10_RANK.max+'위')+' 등장 일수 순</span></div>'
  +   '<div class="bars">'
  +   stocks.slice().sort(function(a,b){return b.days-a.days;}).map(function(s){
        const ratio = Math.min(s.days/Math.max(totalDays,1), 1);
        const w = Math.max(ratio*100,2);
        // 색상 = 출현빈도 기준 (높을수록 진한 sky)
        const col = ratio>=0.8?'#0C447C':(ratio>=0.5?'#185FA5':(ratio>=0.3?'#378ADD':'#B5D4F4'));
        const numCol = ratio>=0.5?'var(--sky800)':'var(--sky600)';
        return '<div class="bar-row" style="cursor:pointer" onclick="goHistory(\''+esc(s.name)+'\')">'
          +'<div class="bar-lbl" title="'+esc(s.name)+'">'+esc(s.name)+'</div>'
          +'<div class="bar-track"><div class="bar-fill" style="width:'+w+'%;background:'+col+'"></div></div>'
          +'<div class="bar-val" style="font-weight:700;color:'+numCol+'">'+s.days+'일</div>'
        +'</div>';
      }).join('')
  +   '</div>'
  + '</div>'

  // ── 종목별 상세 테이블 (매매 분석용)
  + '<div class="sc">'
  +   '<div class="sc-title">종목별 매매 분석 <span class="sub">정렬: '+sortLabels[TOP10_SORT]+' · 행 클릭 시 이력 이동</span></div>'
  +   '<div class="tbl-wrap"><table>'
  +   '<thead><tr>'
  +     '<th class="l" style="padding-left:6px">종목</th>'
  +     '<th>모멘텀</th>'
  +     '<th>자금흐름</th>'
  +     '<th>평균순위</th>'
  +     '<th>순위추세</th>'
  +     '<th>자금유입</th>'
  +     '<th>출현율</th>'
  +     '<th>연속</th>'
  +     '<th>평균거래대금</th>'
  +     '<th>기간수익</th>'
  +     '<th>최근등락</th>'
  +     '<th class="pc-col">시장</th>'
  +     '<th class="pc-col">평균시총</th>'
  +     '<th class="pc-col">평균회전율</th>'
  +   '</tr></thead>'
  +   '<tbody>'
  +   stocks.map(function(s){
        const consecBdg = s.consec>=3
          ? '<span class="bdg" style="background:var(--red50);color:var(--red);margin-left:5px;font-size:11px;padding:2px 7px">🔥'+s.consec+'</span>'
          : s.consec>=2
          ? '<span class="bdg" style="background:var(--amber50);color:var(--amber);margin-left:5px;font-size:11px;padding:2px 7px">'+s.consec+'</span>'
          : '';
        const rateBdg = s.rate>=80
          ? '<span class="bdg" style="background:var(--teal50);color:var(--teal600)">'+s.rate+'%</span>'
          : s.rate+'%';
        const mc = s.momentum>=75?'var(--red)':(s.momentum>=55?'var(--coral)':(s.momentum>=40?'var(--sky600)':'var(--txt2)'));
        const momBarW = Math.max(Math.min(s.momentum,100),0);
        const priceChgHtml = s.priceChg==null ? '<span style="color:var(--txt2)">-</span>'
          : '<span class="'+(s.priceChg>0?'t-up':(s.priceChg<0?'t-down':''))+'" style="font-weight:600">'+(s.priceChg>0?'+':'')+s.priceChg+'%</span>';
        return '<tr>'
          +'<td class="l t-name" style="padding-left:6px;cursor:pointer" onclick="goHistory(\''+esc(s.name)+'\')">'
          +  esc(s.name)+consecBdg
          +'</td>'
          +'<td style="min-width:72px;vertical-align:middle"><div class="mom-cell"><div class="mom-bar-wrap"><div class="mom-bar-fill" style="width:'+momBarW+'%;background:'+mc+'"></div></div><span class="mom-cell-num">'+s.momentum+'</span></div></td>'
          +'<td><span class="fs-bdg '+s.flowCls+'">'+esc(s.flowState)+'</span></td>'
          +'<td style="font-weight:600;color:var(--txt)">'+(s.avgRank!==null?s.avgRank.toFixed(1)+'위':'-')+'</td>'
          +'<td>'+trendArrow(s.rankTrend)+'</td>'
          +'<td>'+inflowHtml(s.inflowPct)+'</td>'
          +'<td>'+rateBdg+'</td>'
          +'<td style="font-weight:600">'+(s.consec>=2?'<span style="color:var(--coral)">'+s.consec+'일</span>':s.consec+'일')+'</td>'
          +'<td class="t-amt">'+fmtAmt(s.avgAmt)+'</td>'
          +'<td>'+priceChgHtml+'</td>'
          +'<td class="'+chgCls(s.lastChg)+' t-chg">'+fmtPct(s.lastChg)+'</td>'
          +'<td class="pc-col">'+mktBadge(s.primaryMarket)+'</td>'
          +'<td class="pc-col">'+fmtMktcap(s.avgMktcap)+'</td>'
          +'<td class="pc-col" style="color:var(--purple);font-weight:700">'+fmtTurnover(s.avgTurnover)+'</td>'
        +'</tr>';
      }).join('')
  +   '</tbody></table></div>'
  +   '<div class="legend-row">'
  +     '<span class="legend-item"><b>모멘텀</b> 출현율·평균순위·순위추세·자금유입·연속성 종합 (0~100)</span>'
  +     '<span class="legend-item"><b>순위추세</b> 기간 전반 대비 후반 평균순위 변화 (▲상승 ▼하락)</span>'
  +     '<span class="legend-item"><b>자금유입</b> 기간 후반 평균거래대금 / 전반 대비 증감률</span>'
  +     '<span class="legend-item"><b>기간수익</b> 첫 종가 → 마지막 종가 변화율</span>'
  +   '</div>'
  + '</div>'

  // ── 날짜별 TOP 히트맵
  + (function(){
      const viewDates = dates.slice(0, TOP10_PERIOD > 0 ? TOP10_PERIOD : Math.min(dates.length, 30));
      if(viewDates.length < 2) return '';
      const viewSet = new Set(viewDates);
      const rowMap = new Map(rows.filter(function(r){return viewSet.has(r.date);}).sort(function(a,b){return b.rank-a.rank;}).map(function(r){return [r.date+'|'+r.name, r];}));
      const allNames = stocks.map(function(s){return s.name;});
      return '<div class="sc">'
        +'<div class="sc-title">날짜별 출현 현황 <span class="sub">최근 '+viewDates.length+'일 · 셀=등락률</span></div>'
        +'<div style="overflow-x:auto">'
        +'<table style="min-width:max-content">'
        +'<thead><tr>'
        +  '<th class="l" style="padding-left:6px;min-width:100px;font-size:14px">종목</th>'
        +  viewDates.map(function(d){
             return '<th style="font-size:13px;min-width:52px;text-align:center;white-space:nowrap">'+fmtDateShort(d)+'</th>';
           }).join('')
        +'</tr></thead>'
        +'<tbody>'
        + allNames.map(function(name){
            return '<tr>'
              +'<td class="l t-name" style="padding-left:6px;font-size:14px;cursor:pointer" onclick="goHistory(\''+esc(name)+'\')">'+esc(name)+'</td>'
              + viewDates.map(function(d){
                  const r = rowMap.get(d+'|'+name);
                  if(!r) return '<td style="background:var(--gray50);text-align:center;font-size:13px;color:var(--txt3)">-</td>';
                  const bg = safeN(r.chg)?'#E0EAF5':(r.chg>0?'rgba(216,48,47,.13)':(r.chg<0?'rgba(37,99,201,.13)':'#f1efe8'));
                  const cl = chgCls(r.chg);
                  return '<td class="'+cl+'" style="background:'+bg+';text-align:center;font-size:13px;font-weight:700;padding:10px 6px" title="'+fmtRank(r.rank)+' / '+fmtPct(r.chg)+'">'
                    +fmtPct(r.chg)
                  +'</td>';
                }).join('')
            +'</tr>';
          }).join('')
        +'</tbody></table>'
        +'</div></div>';
    })();
  panel.insertAdjacentHTML('beforeend', missingTradingDaysHtml());
}

// ════════════════════════════════════════════════
// TAB 5 — 종목이력
// ════════════════════════════════════════════════
function renderHistory(){
  const panel = document.getElementById('panel-history');
  if(!VOLUMES.length){ panel.innerHTML = emptyPanel(); return; }
  const periodRows = rowsInPeriod(HIST_PERIOD);
  const allStocks = [...new Set(periodRows.map(r=>r.name))].sort();
  if(!HIST_STOCK || !allStocks.includes(HIST_STOCK)) HIST_STOCK = allStocks[0]||'';
  const allHistRows = periodRows.filter(r=>r.name===HIST_STOCK).sort((a,b)=>a.date.localeCompare(b.date));
  const histRows = allHistRows.filter(r=>
    (!HIST_YEAR  || r.date.startsWith(HIST_YEAR)) &&
    (!HIST_MONTH || r.date.slice(5,7)===HIST_MONTH) &&
    (!HIST_DAY   || r.date.slice(8,10)===HIST_DAY)
  );
  const rankVals = histRows.map(r=>r.rank).filter(r=>validRank(r));
  const avgRank = rankVals.length ? (rankVals.reduce((s,v)=>s+v,0)/rankVals.length).toFixed(1) : '-';
  const bestRank = rankVals.length ? Math.min(...rankVals) : '-';
  const worstRank = rankVals.length ? Math.max(...rankVals) : '-';
  const filteredDays = getPeriodDates(HIST_PERIOD).filter(d=>
    (!HIST_YEAR  || d.startsWith(HIST_YEAR)) &&
    (!HIST_MONTH || d.slice(5,7)===HIST_MONTH) &&
    (!HIST_DAY   || d.slice(8,10)===HIST_DAY)
  ).length;
  const appearRate = filteredDays>0 ? Math.round(histRows.length/filteredDays*100) : 0;
  const amtVals = histRows.map(r=>r.amt).filter(a=>!safeN(a));
  const avgAmt = amtVals.length ? amtVals.reduce((s,v)=>s+v,0)/amtVals.length : null;
  const stockOpts = allStocks.map(n=>'<option value="'+esc(n)+'"'+(HIST_STOCK===n?' selected':'')+'>'+esc(n)+'</option>').join('');

  panel.innerHTML = ''
  + kpiRow([
      {cls:'kpi-tot',  num:histRows.length,                          lbl:'출현일수'},
      {cls:'kpi-amber',num:appearRate+'%',                           lbl:'출현율'},
      {cls:'kpi-teal', num:avgRank,                                  lbl:'평균순위'},
      {cls:'kpi-up',   num:bestRank!=='-'?bestRank+'위':'-',         lbl:'최고순위'},
      {cls:'kpi-coral',num:worstRank!=='-'?worstRank+'위':'-',       lbl:'최저순위'},
      {cls:'kpi-amt',  num:fmtAmt(avgAmt),                          lbl:'평균대금'},
    ])
  + '<div class="toolbar"><div class="f-row">'
  +   '<span class="f-label">기간</span>'+periodSelHtml('hisPeriod','setHistPeriod(this.value)',HIST_PERIOD)
  +   '<span class="f-label">종목</span><select class="sel" onchange="setHistStock(this.value)">'+stockOpts+'</select>'
  +   '<span style="font-size:13px;font-weight:700;color:var(--txt2)">'+rowsInPeriod(HIST_PERIOD).length+'건</span>'
  + '</div></div>'
  + (histRows.length===0
    ? '<div class="empty"><div class="ico">📭</div><div class="msg">해당 기간 데이터 없음</div></div>'
    : '<div class="sc"><div class="sc-title"><span style="color:var(--sky600)">'+esc(HIST_STOCK)+'</span> <span class="sub">순위 추이 · 낮을수록 상위권</span></div>'
    +   '<div class="trend-wrap">'+rankTrendSvg(histRows)+'</div>'
    + '</div>'
    + '<div class="sc"><div class="sc-title">일별 상세</div>'
    +   '<div class="tbl-wrap"><table>'
    +     '<thead><tr><th class="l" style="padding-left:6px">날짜</th><th>순위</th><th>종가</th><th>등락률</th><th class="pc-col">시가</th><th class="pc-col">고가</th><th class="pc-col">저가</th><th>거래대금</th><th class="pc-col">시가총액</th><th class="pc-col">회전율</th></tr></thead>'
    +     '<tbody>'
    +       [...histRows].reverse().map(function(r){
            return '<tr>'
              +'<td class="l" style="padding-left:6px;font-weight:700">'+fmtDate(r.date)+'</td>'
              +'<td style="font-weight:800;color:var(--sky600)">'+fmtRank(r.rank)+'</td>'
              +'<td>'+fmtNum(r.close)+'</td>'
              +'<td class="'+chgCls(r.chg)+' t-chg">'+fmtPct(r.chg)+'</td>'
              +'<td class="pc-col">'+fmtNum(r.open)+'</td>'
              +'<td class="pc-col" style="color:var(--red)">'+fmtNum(r.high)+'</td>'
              +'<td class="pc-col" style="color:var(--blue)">'+fmtNum(r.low)+'</td>'
              +'<td class="t-amt">'+fmtAmt(r.amt)+'</td>'
              +'<td class="pc-col">'+fmtMktcap(r.mktcap)+'</td>'
              +'<td class="pc-col" style="color:var(--purple);font-weight:700">'+fmtTurnover(r.turnover)+'</td>'
              +'</tr>';
          }).join('')
    +     '</tbody></table></div>'
    + '</div>'
  );
}

function rankTrendSvg(rows){
  if(!rows.length) return '';
  const dates = rows.map(r=>r.date);
  const ranks = rows.map(r=>validRank(r.rank)?r.rank:null);
  const validRanks = ranks.filter(r=>r!=null);
  if(!validRanks.length) return '';
  const N = dates.length;
  const W = Math.max(N*52, 320), H = 180;
  const padL=32, padR=14, padT=26, padB=32;
  const iw=W-padL-padR, ih=H-padT-padB;
  const minR=Math.min(...validRanks), maxR=Math.max(...validRanks);
  const rng = Math.max(maxR-minR, 1);
  const x = i => padL + (N<=1?iw/2:i/(N-1)*iw);
  // rank 1 at top: higher y value → worse rank
  const y = r => padT + (r-minR)/rng*ih;
  // grid lines
  let grid='';
  const gridVals = [...new Set([minR, Math.round((minR+maxR)/2), maxR])];
  gridVals.forEach(v=>{ const gy=y(v); grid+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" stroke="#E0EAF5" stroke-width="1"/><text x="'+(padL-5)+'" y="'+(gy+4)+'" text-anchor="end" font-size="10" fill="#6B7E99">'+v+'위</text>'; });
  // line segments (skip null)
  let path='', prevX=null, prevY=null;
  rows.forEach((r,i)=>{
    if(r.rank==null){ prevX=null; prevY=null; return; }
    const cx=x(i), cy=y(r.rank);
    if(prevX===null) path+='M '+cx+' '+cy;
    else path+=' L '+cx+' '+cy;
    prevX=cx; prevY=cy;
  });
  // dots & labels
  const dots = rows.map((r,i)=>{
    if(r.rank==null) return '';
    const cx=x(i), cy=y(r.rank);
    const dotFill=safeN(r.chg)?'#378ADD':(r.chg>0?'#D8302F':(r.chg<0?'#2563C9':'#7E8CA0'));
    return '<circle cx="'+cx+'" cy="'+cy+'" r="4.5" fill="'+dotFill+'" stroke="#fff" stroke-width="1.5"/>'
      +'<text x="'+cx+'" y="'+(cy-9)+'" text-anchor="middle" font-size="10" font-weight="700" fill="'+dotFill+'">'+r.rank+'</text>';
  }).join('');
  const labels = dates.map((d,i)=>'<text x="'+x(i)+'" y="'+(H-8)+'" text-anchor="middle" font-size="10" fill="#6B7E99">'+fmtDateShort(d)+'</text>').join('');
  return '<svg class="trend-svg" viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'">'
    + grid
    + '<path d="'+path+'" fill="none" stroke="#378ADD" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'
    + dots + labels
  +'</svg>';
}

function renderVolatility(){
  const panel = document.getElementById('panel-volatility');
  const fv = filteredVolumes();
  if(!fv.length){ panel.innerHTML = emptyPanel(); return; }
  const dates = getPeriodDates(0);
  if(!SEL_DATE || !dates.includes(SEL_DATE)) SEL_DATE = dates[0]||'';
  const rows = fv.filter(r=>r.date===SEL_DATE).sort((a,b)=>(a.rank??999)-(b.rank??999));
  if(!rows.length){ panel.innerHTML='<div class="empty"><div class="ico">📊</div><div class="msg">해당일 데이터 없음</div></div>'; return; }

  function classify(r){
    const turn=r.turnover||0, chgAbs=Math.abs(r.chg||0), vola=r.volatility||0;
    if(turn>=1||chgAbs>=5||(vola>0&&r.close>0&&vola/r.close*100>=3)) return {cls:'vcls-spec',lbl:'투기적'};
    if(!safeN(r.mktcap)&&r.mktcap>=1e12&&turn<0.3) return {cls:'vcls-inst',lbl:'수급주도'};
    if(chgAbs<2&&turn<0.5) return {cls:'vcls-stbl',lbl:'안정적'};
    return {cls:'vcls-neut',lbl:'중립'};
  }

  const classified = rows.map(r=>({...r,vclass:classify(r)}));
  const specList = classified.filter(r=>r.vclass.lbl==='투기적');
  const instList = classified.filter(r=>r.vclass.lbl==='수급주도');
  const stblList = classified.filter(r=>r.vclass.lbl==='안정적');
  const neutList = classified.filter(r=>r.vclass.lbl==='중립');
  const kospiRows = rows.filter(r=>r.market==='KOSPI');
  const kosdaqRows = rows.filter(r=>r.market==='KOSDAQ');
  const hasTurnover = rows.filter(r=>!safeN(r.turnover));
  const avgTurnover = hasTurnover.length ? hasTurnover.reduce((s,r)=>s+(r.turnover||0),0)/hasTurnover.length : null;
  const sortedByTurnover = [...classified].sort((a,b)=>(b.turnover||0)-(a.turnover||0));

  function mktSummaryRow(label,rws,cls){
    if(!rws.length) return '';
    const totalAmt=rws.reduce((s,r)=>s+(r.amt||0),0);
    const ht=rws.filter(r=>!safeN(r.turnover));
    const avgTurn=ht.length?ht.reduce((s,r)=>s+(r.turnover||0),0)/ht.length:null;
    const avgChg=rws.reduce((s,r)=>s+(r.chg||0),0)/rws.length;
    return '<tr>'
      +'<td class="l" style="padding-left:6px;font-weight:800"><span class="'+cls+'">'+label+'</span></td>'
      +'<td style="font-weight:700">'+rws.length+'개</td>'
      +'<td class="t-amt">'+fmtAmt(totalAmt)+'</td>'
      +'<td class="'+(avgChg>0?'t-up':avgChg<0?'t-down':'')+' t-chg">'+fmtPct(avgChg)+'</td>'
      +'<td style="color:var(--purple);font-weight:700">'+fmtTurnover(avgTurn)+'</td>'
    +'</tr>';
  }

  panel.innerHTML = ''
  + kpiRow([
      {cls:'kpi-up',   num:specList.length,       lbl:'🔥 투기적'},
      {cls:'kpi-tot',  num:instList.length,        lbl:'💼 수급주도'},
      {cls:'kpi-teal', num:stblList.length,        lbl:'🟢 안정적'},
      {cls:'kpi-amber',num:fmtTurnover(avgTurnover),lbl:'평균회전율'},
      {cls:'kpi-sky',  num:kospiRows.length+'/'+kosdaqRows.length, lbl:'KOSPI/KOSDAQ'},
    ])
  + '<div class="toolbar"><div class="f-row">'
  +   '<span class="f-label">날짜</span>'+dateTripleSelHtml()
  +   mktFilterHtml()
  + '</div></div>'

  + '<div class="sc"><div class="sc-title">변동성 분류 <span class="sub">'+esc(SEL_DATE)+'</span></div>'
  + '<div class="vcls-grid">'
  + [
      {cls:'vcls-spec',lbl:'🔥 투기적',sub:'회전율≥1% 또는 |등락률|≥5%',list:specList},
      {cls:'vcls-inst',lbl:'💼 수급주도',sub:'시총≥1조 & 회전율<0.3%',list:instList},
      {cls:'vcls-stbl',lbl:'🟢 안정적',sub:'|등락률|<2% & 회전율<0.5%',list:stblList},
      {cls:'vcls-neut',lbl:'⚪ 중립',sub:'기타',list:neutList},
    ].map(function(cat){
      return '<div class="vcls-card">'
        +'<div><span class="bdg '+cat.cls+'">'+cat.lbl+'</span></div>'
        +'<div class="vcls-num">'+cat.list.length+'</div>'
        +'<div class="vcls-lbl">'+cat.sub+'</div>'
        +(cat.list.length?'<div class="vcls-names">'+cat.list.map(r=>esc(r.name)).join(' · ')+'</div>':'')
      +'</div>';
    }).join('')
  + '</div></div>'

  + ((kospiRows.length||kosdaqRows.length) ? (
    '<div class="sc"><div class="sc-title">시장별 현황</div>'
    +'<div class="tbl-wrap"><table>'
    +'<thead><tr><th class="l" style="padding-left:6px">시장</th><th>종목수</th><th>합계거래대금</th><th>평균등락률</th><th>평균회전율</th></tr></thead>'
    +'<tbody>'
    +mktSummaryRow('KOSPI',kospiRows,'mkt-k')
    +mktSummaryRow('KOSDAQ',kosdaqRows,'mkt-q')
    +'</tbody></table></div></div>'
  ) : '')

  + '<div class="sc"><div class="sc-title">회전율·변동성 분석 <span class="sub">회전율 순</span></div>'
  + '<div class="tbl-wrap"><table>'
  + '<thead><tr>'
  + '<th class="l" style="padding-left:6px">순위</th>'
  + '<th class="l">종목</th>'
  + '<th>등락률</th>'
  + '<th>변동폭</th>'
  + '<th>회전율</th>'
  + '<th>시가총액</th>'
  + '<th>거래대금</th>'
  + '<th>분류</th>'
  + '</tr></thead>'
  + '<tbody>'
  + sortedByTurnover.map(function(r){
      return '<tr>'
        +'<td class="l t-rank" style="padding-left:6px">'+fmtRank(r.rank)+'</td>'
        +'<td class="l t-name" style="cursor:pointer" onclick="goHistory(\''+esc(r.name)+'\')">'+esc(r.name)+mktBadge(r.market)+'</td>'
        +'<td class="'+chgCls(r.chg)+' t-chg">'+fmtPct(r.chg)+'</td>'
        +'<td style="font-weight:600">'+(safeN(r.volatility)?'-':fmtNum(r.volatility))+'</td>'
        +'<td style="font-weight:700;color:var(--purple)">'+(safeN(r.turnover)?'-':r.turnover.toFixed(2)+'%')+'</td>'
        +'<td>'+fmtMktcap(r.mktcap)+mktcapSize(r.mktcap)+'</td>'
        +'<td class="t-amt">'+fmtAmt(r.amt)+'</td>'
        +'<td><span class="bdg '+r.vclass.cls+'">'+r.vclass.lbl+'</span></td>'
      +'</tr>';
    }).join('')
  + '</tbody></table></div>'
  + '<div class="legend-row">'
  + '<span class="legend-item"><b>변동폭</b> 당일 고가-저가 (원)</span>'
  + '<span class="legend-item"><b>회전율</b> 거래량/상장주식수×100 (%)</span>'
  + '<span class="legend-item"><b>투기적</b> 회전율≥1% 또는 |등락률|≥5%</span>'
  + '<span class="legend-item"><b>수급주도</b> 시총≥1조 & 회전율<0.3%</span>'
  + '</div></div>';
}

function kpiRow(items){
  return '<div class="kpi-row">'+items.map(function(i){
    const isNum = (typeof i.num === 'number') || (typeof i.num === 'string' && /^[+\-]?[\d,\.조억만%위]+$/.test(String(i.num).trim()));
    const nc = isNum ? 'num-n' : 'num';
    return '<div class="kpi-card '+i.cls+'"><div class="'+nc+'">'+i.num+'</div><div class="lbl">'+i.lbl+'</div></div>';
  }).join('')+'</div>';
}
function emptyPanel(){
  if(!CFG.workerUrl) return '<div class="empty"><div class="ico">🔌</div><div class="msg">Notion DB가 연결되지 않았습니다</div><div class="sub">우측 상단 <b>설정</b>에서 Worker URL을 입력하세요</div></div>';
  if(IS_LOADING) return '<div class="sc"><div class="skel" style="height:280px"></div></div>';
  return '<div class="empty"><div class="ico">📊</div><div class="msg">데이터 없음</div><div class="sub">새로고침을 눌러 데이터를 불러오세요</div></div>';
}

// 설정 모달
// ════════════════════════════════════════════════
function maskVal(v){
  if(!v) return '';
  if(v.startsWith('http')){ try{ const u=new URL(v); const h=u.hostname; const p=h.split('.'); const m=p[0].length>4?p[0].slice(0,2)+'XX'+p[0].slice(-2)+'.'+p.slice(1).join('.'):'XX.'+p.slice(1).join('.'); return u.protocol+'//'+m; }catch(e){ return v.slice(0,6)+'XX...'; } }
  if(/^[0-9a-f\-]{32,36}$/i.test(v)){ const c=v.replace(/-/g,''); return c.slice(0,4)+'-XXXX-XXXX-XXXX-'+c.slice(-4); }
  return v.slice(0,3)+'XX...';
}
function openCfgModal(){
  const set=(id,val)=>{ const el=document.getElementById(id); if(!el) return; if(val){ el.value=''; el.placeholder=maskVal(val); el.dataset.saved='1'; }else{ el.value=''; delete el.dataset.saved; } };
  set('cfgWorkerUrl',CFG.workerUrl); set('cfgVolumeDbId',CFG.volumeDbId);
  const m=document.getElementById('cfgModal'); if(m){ m.classList.add('modal-open'); document.body.style.overflow='hidden'; }
}
function closeCfgModal(e){ if(e&&e.target!==e.currentTarget) return; const m=document.getElementById('cfgModal'); if(m){ m.classList.remove('modal-open'); document.body.style.overflow=''; } }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeCfgModal(e); });
function saveCfg(){
  const w=document.getElementById('cfgWorkerUrl').value.trim();
  const v=document.getElementById('cfgVolumeDbId').value.trim();
  if(w) CFG.workerUrl=w; if(v) CFG.volumeDbId=v;
  try{ var store=document.getElementById('cfgSessionOnly')?.checked ? sessionStorage : localStorage; store.setItem('vr_workerUrl',CFG.workerUrl); store.setItem('vr_volumeDbId',CFG.volumeDbId); }catch(e){}
  closeCfgModal(); loadData();
}
function updateCfgStatus(ok){
  const dot=document.getElementById('cfgDot'); if(dot) dot.classList.toggle('off',ok!==true);
  const lu=document.getElementById('lastUpdate'); if(!lu) return;
  if(ok===true){ const n=new Date(); lu.textContent='업데이트 '+String(n.getMonth()+1).padStart(2,'0')+'.'+String(n.getDate()).padStart(2,'0')+' '+n.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); lu.style.color='rgba(255,255,255,.75)'; }
  else if(ok===false){ lu.textContent='⚠ 로드 실패 — 설정 확인'; lu.style.color='rgba(255,170,150,.95)'; }
}
function toast(msg){ const t=document.getElementById('toast'); if(!t) return; t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2800); }

function loadDemo(reason){
  IS_DEMO=true; VOLUMES=window.DEMO_VOLUMES.slice(); SEL_DATE='';
  renderCurrent();
  const lu=document.getElementById('lastUpdate'); if(lu){ lu.textContent='● 데모 데이터 (미연결)'; lu.style.color='rgba(255,214,150,.95)'; }
  const dot=document.getElementById('cfgDot'); if(dot) dot.classList.add('off');
}

// ════════════════════════════════════════════════
// 데이터 로드
// ════════════════════════════════════════════════
function friendlyErr(msg){ msg=msg||'오류'; if(msg.includes('401')||msg.includes('403')) return '인증 오류'; if(msg.includes('404')) return 'DB 없음'; if(msg.includes('Worker')) return 'Worker URL 오류'; if(msg.includes('Failed to fetch')) return '네트워크 오류'; return msg; }

async function loadData(){
  const btn=document.getElementById('syncBtn'), ico=document.getElementById('syncIcon'), lab=document.getElementById('syncLabel');
  if(btn) btn.disabled=true; if(ico) ico.classList.add('spinning'); if(lab) lab.textContent='로딩…';
  IS_LOADING=true; renderCurrent();
  try{
    const pages = await loadAllYears(CFG.volumeDbId, [{property:'날짜',direction:'descending'},{property:'순위',direction:'ascending'}]);
    const parsed = parseVolumes(pages);
    if(!parsed.length) throw new Error('데이터 없음');
    IS_DEMO=false; IS_LOADING=false; VOLUMES=parsed; SEL_DATE='';
    renderCurrent();
    updateCfgStatus(true);
    toast('로드 완료 — '+VOLUMES.length+'건');
  }catch(e){
    IS_LOADING=false;
    updateCfgStatus(false);
    loadDemo(friendlyErr(e.message));
  }finally{
    if(btn) btn.disabled=false; if(ico) ico.classList.remove('spinning'); if(lab) lab.textContent='새로고침';
  }
}

// ── 헤더 높이 보정 ──
function applyHeaderOffset(){ const h=document.querySelector('.hdr-wrap'), m=document.getElementById('main'); if(h&&m) m.style.paddingTop=h.offsetHeight+'px'; }
if(typeof ResizeObserver!=='undefined'){ const el=document.querySelector('.hdr-wrap'); if(el){ new ResizeObserver(applyHeaderOffset).observe(el); applyHeaderOffset(); } }
else{ applyHeaderOffset(); window.addEventListener('resize',applyHeaderOffset); }

// ── 초기 진입 ──
(function init(){
  updateCfgStatus(undefined);
  loadDemo('초기화');
  loadData();
})();
